name: FinanceFlow CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: financeflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-on: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Setup Environment
      run: |
        echo "DATABASE_URL=postgresql://postgres:password@localhost:5432/financeflow_test?schema=public" >> .env
        echo "REDIS_URL=redis://localhost:6379" >> .env
        echo "AUTH_SECRET=01234567890123456789012345678901" >> .env
        echo "JWT_SECRET=01234567890123456789012345678902" >> .env

    - name: Generate Prisma Client
      run: npm run db:generate

    - name: Push Database Schema
      run: npx prisma db push

    - name: Run TypeScript compiler check
      run: npm run typecheck

    - name: Run Unit/Integration Tests
      run: npm run test:unit
